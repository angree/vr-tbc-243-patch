# VR settings. Edit a value, save the file, the change applies in ~2 seconds
# (no game restart needed) - EXCEPT ui_sharpness / world_sharpness (see note below).
# Lines starting with # are comments.

# --- Nameplates (names / health bars above characters) ---
nameplate_depth  = 1.0      # 3D depth of the names: 1.0 = full 3D, 0.0 = flat
nameplate_yshift = 0.013    # height of the names above the head
nameplate_xshift = -0.142   # horizontal fix (only used in flat mode)

# --- Highlight glow (unit under your gaze / your current target) ---
# color = R G B (each 0..1). bright = glow strength 1..5.
mouseover_color  = 1.0 0.1 0.1
mouseover_bright = 2
target_color     = 0.1 0.4 1.0
target_bright    = 10

# --- Aim crosshair (center reticle) ---
crosshair        = 1            # 1 = on, 0 = off
crosshair_size   = 6            # half-length in pixels (bigger = larger)
crosshair_color  = 1.0 0.8 0.6  # R G B (0..1)
crosshair_offset = 2            # horizontal calibration (px): move the two eyes' crosshairs together/apart
crosshair_yoffset = 0           # vertical calibration (px): move both up/down

# --- Aim assist (easier gaze targeting: try center ray, then wider rings) ---
aim_assist     = 1     # 1 = on, 0 = off (exact center ray only)
aim_rings      = 2     # number of wider rings to try (0..4)
aim_spread_deg = 2.0   # angle step per ring in degrees (bigger = casts wider)
aim_samples    = 6     # probe points per ring (3..16)

# --- Floating game screen (the flat WoW image shown inside VR) ---
screen_size     = 1.2       # size of the screen (bigger number = bigger screen)
screen_distance = -100      # how far in front of you the screen sits
screen_height   = -20       # screen height (up / down)
screen_depth    = -0.94055  # projection depth of the screen (advanced - leave as is unless you know)
# screen_curve: shape of the screen. +1 = concave (curves around you, the good look),
# 0 = flat, -1 = convex (bulges toward you). In-between values = gentler/stronger curve.
# NOTE: takes effect after a game RESTART (the screen mesh is built once at startup).
screen_curve    = 1.0       # +1 concave (default) / 0 flat / -1 convex

# --- Render sharpness (higher = sharper but heavier / lower fps) ---
# NOTE: these two ONLY take effect after you RESTART the game (unlike everything above).
# Value range 1..3. 1 = native (fastest). Raise only if you have fps to spare.
ui_sharpness    = 1   # sharpness of the interface / HUD
world_sharpness = 1    # sharpness of the 3D world

# --- World scale (VR miniature / giant effect) ---
# 1.0 = normal. Lower = whole world looks smaller (0.25 = 25%, "toybox" / miniature, Lego-like).
# Higher = giant world. Gameplay is unchanged; only the VR perspective scales. Live (~2s).
world_scale = 0.7
